name: Update dashboard data

# Refreshes SullyGnome data and commits site/public/data.json so the deployed
# Vercel site shows fresh stats. Runtime is plain `requests` (no browser).
on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours (UTC) — keeps the Newest feed + per-stream viewer stats fresh; Twitch pull is cheap, SullyGnome scan stays light (window=3, throttled)
  workflow_dispatch: {}       # manual "Run workflow" button

env:
  # SullyGnome only accepts specific day windows (3/7/30/365) — others return empty!
  LP_RECENT_WINDOW: "7"      # scan channels active in the last 7 days (fills recent gaps)
  LP_STREAM_WINDOW: "30"     # pull each channel's last 30 days of streams (backfill depth)

permissions:
  contents: write             # allow committing data back to the repo

concurrency:
  group: site-refresh        # shared with live-snapshot.yml so pushes never race
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Collect SullyGnome channel + chart data
        run: python sullygnome_collector.py

      - name: Collect recent Last Pirates streams
        run: python collect_streams.py

      - name: Collect short-window (hourly) + momentum
        run: python collect_recent.py

      - name: Refresh per-channel all-time meta (last stream + total streams, batched)
        run: python collect_channel_meta.py

      - name: Collect Twitch-first recent streams (Helix videos by game)
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python collect_videos.py

      - name: Pull latest live history from the 'data' branch (snapshots live there now)
        # BEFORE enrich so enrich_helix can also resolve captured/live channels' VODs
        run: |
          curl -sfL "https://raw.githubusercontent.com/cmnick-RSG/lp-twitch-deck/data/site/public/live_history.json" \
            -o site/public/live_history.json || echo "[]" > site/public/live_history.json

      - name: Enrich streams with Twitch VOD data + per-channel VOD map (links/views/thumbs)
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python enrich_helix.py

      - name: Build site data.json
        run: python build_site_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "lp-deck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/public/data.json site/public/roster.json site/public/channel_meta.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            # NOTE: no "[skip ci]" — Vercel honours that tag and would SKIP the deploy,
            # leaving the live site's data.json stale. We WANT this commit to deploy.
            # (No GitHub workflow triggers on push — only schedule/dispatch — so no CI loop.)
            git commit -m "data: refresh streams"
            # retry push with rebase — survives a race with a concurrent human/bot push
            for i in 1 2 3 4 5; do
              git push && break || { echo "push race, rebasing…"; git pull --rebase --autostash origin main; }
            done
          fi

      - name: Trigger Vercel deploy of the fresh data.json
        # Vercel's auto-deploy on bot pushes is unreliable here (prod ends up ~1 build
        # behind main). A deploy hook makes every 2h build publish deterministically.
        # Add the hook URL as repo secret VERCEL_DEPLOY_HOOK (Settings → Secrets → Actions).
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -s -X POST "$VERCEL_DEPLOY_HOOK" >/dev/null && echo "Vercel deploy triggered." || echo "deploy hook call failed."
          else
            echo "No VERCEL_DEPLOY_HOOK secret set — relying on Vercel auto-deploy."
          fi
