name: Update dashboard data

# Refreshes SullyGnome data and commits site/public/data.json so the deployed
# Vercel site shows fresh stats. Runtime is plain `requests` (no browser).
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC) — reliable on free-tier; aggregates barely move hourly, live data comes from /api/live in real time
  workflow_dispatch: {}       # manual "Run workflow" button

env:
  LP_RECENT_WINDOW: "3"      # hourly job scans the recent (3-day) window — lighter & fresh
  LP_STREAM_WINDOW: "7"

permissions:
  contents: write             # allow committing data back to the repo

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Collect SullyGnome channel + chart data
        run: python sullygnome_collector.py

      - name: Collect recent Last Pirates streams
        run: python collect_streams.py

      - name: Collect short-window (hourly) + momentum
        run: python collect_recent.py

      - name: Enrich streams with Twitch VOD data (links/views/thumbnails)
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python enrich_helix.py

      - name: Build site data.json
        run: python build_site_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "lp-deck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/public/data.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh SullyGnome stats [skip ci]"
            git push
          fi
