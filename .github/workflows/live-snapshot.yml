name: Live snapshot

# Cheap, frequent capture of LIVE Last Pirates streams straight from Twitch
# (viewer counts + followers), persisted to site/public/live_history.json so a
# stream stays in the feed after it ends. NO SullyGnome here — Twitch only.
# The frontend overlays this file fresh between the heavier 2h full builds.
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (UTC) — BACKUP trigger. GitHub free-tier schedules
                              # are unreliable, so the primary trigger is cron-job.org hitting
                              # workflow_dispatch every 5 min. Public repo => unlimited Actions
                              # minutes. Commits go to the 'data' branch (Vercel doesn't watch it).
  workflow_dispatch: {}

permissions:
  contents: write

# share a serialization group with the full build so their pushes never race
concurrency:
  group: site-refresh
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Snapshot live streams (Twitch Helix)
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python collect_stream_history.py
      - name: Publish live history to the 'data' branch (NOT main)
        run: |
          git config user.name  "lp-deck-bot"
          git config user.email "actions@users.noreply.github.com"
          # Push snapshots to a dedicated 'data' branch that Vercel does NOT watch. This keeps the
          # high-frequency commits off main, so they neither trigger deploy churn NOR suppress the
          # deploy of real main commits (a "[skip ci]" snapshot landing on top used to block it).
          # The frontend reads live_history.json from this branch via GitHub raw. force-push: ok.
          git checkout -B data
          git add -f site/public/live_history.json
          if git diff --cached --quiet; then
            echo "No live changes."
          else
            git commit -m "live: snapshot"
            git push -f origin data
          fi
