name: Live snapshot

# Cheap, frequent capture of LIVE Last Pirates streams straight from Twitch
# (viewer counts + followers), persisted to site/public/live_history.json so a
# stream stays in the feed after it ends. NO SullyGnome here — Twitch only.
# The frontend overlays this file fresh between the heavier 2h full builds.
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

# share a serialization group with the full build so their pushes never race
concurrency:
  group: site-refresh
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Snapshot live streams (Twitch Helix)
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python collect_stream_history.py
      - name: Commit live history
        run: |
          git config user.name  "lp-deck-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/public/live_history.json
          if git diff --staged --quiet; then
            echo "No live changes."
          else
            # "[skip ci]" is DELIBERATE: Vercel honours it and skips the deploy, so the 30-min
            # snapshots don't churn Vercel. The frontend reads live_history.json directly from
            # GitHub raw, so it sees this commit within ~5 min without a deploy.
            git commit -m "live: snapshot [skip ci]"
            # retry push with rebase — survives a race with a concurrent human/bot push
            for i in 1 2 3 4 5; do
              git push && break || { echo "push race, rebasing…"; git pull --rebase --autostash origin main; }
            done
          fi
