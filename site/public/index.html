<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Last Pirates — Twitch Deck</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3240;
    --text:#e6edf3; --muted:#8b949e; --accent:#3fb950; --accent2:#58a6ff;
    --gold:#e3b341;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
  header{padding:22px 28px;border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;gap:16px;flex-wrap:wrap}
  header h1{font-size:20px;margin:0;letter-spacing:.3px}
  header .sub{color:var(--muted);font-size:13px}
  nav{display:flex;gap:4px;padding:10px 20px;border-bottom:1px solid var(--line);
    flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:5}
  nav button{background:transparent;border:0;color:var(--muted);
    padding:9px 16px;border-radius:8px;cursor:pointer;font-size:14px}
  nav button:hover{color:var(--text);background:var(--panel)}
  nav button.active{color:var(--text);background:var(--panel2);
    box-shadow:inset 0 -2px 0 var(--accent)}
  main{padding:24px 28px;max-width:1200px;margin:0 auto}
  .tab{display:none} .tab.active{display:block}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .tile .v{font-size:28px;font-weight:700}
  .tile .l{color:var(--muted);font-size:13px;margin-top:4px}
  .tile .v.accent{color:var(--accent)} .tile .v.blue{color:var(--accent2)}
  .tile .v.gold{color:var(--gold)}
  h2{font-size:16px;margin:26px 0 12px;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--text)}
  tbody tr:hover{background:var(--panel)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  a{color:var(--accent2);text-decoration:none} a:hover{text-decoration:underline}
  .rank{color:var(--muted);width:34px}
  .search{background:var(--panel);border:1px solid var(--line);color:var(--text);
    padding:9px 12px;border-radius:8px;width:260px;margin-bottom:12px;font-size:14px}
  .row{display:grid;grid-template-columns:36px 1fr auto;gap:12px;align-items:center;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;margin-bottom:8px}
  .row .name{font-weight:600} .row .meta{color:var(--muted);font-size:12.5px}
  .row .big{font-size:18px;font-weight:700;text-align:right}
  .pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);
    border-radius:999px;padding:2px 9px;font-size:11.5px;color:var(--muted);margin-left:6px}
  .chartwrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:16px;margin-bottom:18px;height:300px}
  .lang{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line)}
  .bar{height:7px;background:var(--accent2);border-radius:4px;margin-top:4px}
  .foot{color:var(--muted);font-size:12px;margin-top:30px;border-top:1px solid var(--line);padding-top:14px}
</style>
</head>
<body>
<header>
  <h1>🏴‍☠️ Last Pirates — Twitch Deck</h1>
  <span class="sub" id="meta">loading…</span>
</header>
<nav id="nav"></nav>
<main>
  <section class="tab active" data-tab="overview">
    <div class="tiles" id="tiles"></div>
    <h2>Top 5 channels by hours watched</h2>
    <div id="top5"></div>
  </section>

  <section class="tab" data-tab="live">
    <h2>Live on Twitch right now <span id="liveCount" class="pill"></span></h2>
    <div id="live"></div>
  </section>

  <section class="tab" data-tab="top">
    <h2>Top channels</h2>
    <div id="topchannels"></div>
  </section>

  <section class="tab" data-tab="all">
    <h2>All channels</h2>
    <input class="search" id="search" placeholder="search by name…">
    <div style="overflow:auto"><table id="alltable"></table></div>
  </section>

  <section class="tab" data-tab="streams">
    <h2>Newest Last Pirates streams</h2>
    <div id="streams"></div>
  </section>

  <section class="tab" data-tab="trends">
    <h2>Channels per day</h2><div class="chartwrap"><canvas id="cChannels"></canvas></div>
    <h2>Viewers per day</h2><div class="chartwrap"><canvas id="cViewers"></canvas></div>
  </section>

  <section class="tab" data-tab="langs">
    <h2>Languages</h2>
    <div style="max-width:520px"><div class="chartwrap"><canvas id="cLang"></canvas></div></div>
    <div id="langlist" style="max-width:520px"></div>
  </section>

  <div class="foot" id="foot"></div>
</main>

<script>
const TABS=[["overview","Overview"],["live","🔴 Live now"],["top","Top channels"],
  ["all","All channels"],["streams","Newest streams"],["trends","Trends"],["langs","Languages"]];
const fmt=n=>n==null?"—":Number(n).toLocaleString("en-US");
const hrs=m=>fmt(Math.round((m||0)/60));

let D=null, charted={};

function buildNav(){
  const nav=document.getElementById("nav");
  TABS.forEach(([id,label],i)=>{
    const b=document.createElement("button");
    b.textContent=label; b.className=i===0?"active":"";
    b.onclick=()=>{
      document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      document.querySelector(`.tab[data-tab=${id}]`).classList.add("active");
      if(id==="trends") drawTrends();
      if(id==="langs") drawLangs();
      if(id==="live") drawLive();
    };
    nav.appendChild(b);
  });
}

function overview(){
  const s=D.summary;
  const tiles=[
    ["total_streamers","Total streamers","accent"],
    ["total_hours_streamed","Hours streamed",""],
    ["total_hours_watched","Hours watched","blue"],
    ["peak_concurrent_viewers","Peak viewers","gold"],
    ["partner_channels","Twitch partners",""],
    ["distinct_languages","Languages",""],
  ];
  document.getElementById("tiles").innerHTML=tiles.map(([k,l,c])=>
    `<div class="tile"><div class="v ${c}">${fmt(s[k])}</div><div class="l">${l}</div></div>`).join("");
  document.getElementById("top5").innerHTML=D.channels.slice(0,5).map((c,i)=>rowCard(c,i)).join("");
}

function rowCard(c,i){
  return `<div class="row"><div class="rank">${i+1}</div>
    <div><div class="name"><a href="${c.twitchurl}" target="_blank">${c.displayname}</a>
    <span class="pill">${c.language||"—"}</span>${c.partner?'<span class="pill">partner</span>':''}</div>
    <div class="meta">${fmt(c.followers)} followers · peak ${fmt(c.maxviewers)} · ${hrs(c.streamedminutes)} h streamed</div></div>
    <div class="big">${hrs(c.viewminutes)}<div class="meta">hours watched</div></div></div>`;
}

function topChannels(){
  document.getElementById("topchannels").innerHTML=
    D.channels.slice(0,30).map((c,i)=>rowCard(c,i)).join("");
}

let sortKey="viewminutes", sortDir=-1;
function allTable(){
  const cols=[["rownum","#",0],["displayname","Channel",0],["language","Language",0],
    ["viewminutes","Watch hrs",1],["streamedminutes","Stream hrs",1],
    ["maxviewers","Peak",1],["avgviewers","Avg",1],["followers","Followers",1]];
  const q=(document.getElementById("search").value||"").toLowerCase();
  let rows=D.channels.filter(c=>c.displayname.toLowerCase().includes(q));
  rows.sort((a,b)=>(a[sortKey]>b[sortKey]?1:-1)*sortDir);
  const head=`<thead><tr>${cols.map(([key,l,n])=>
    `<th class="${n?'num':''}" onclick="setSort('${key}')">${l}${sortKey===key?(sortDir<0?' ▾':' ▴'):''}</th>`).join("")}</tr></thead>`;
  const body=`<tbody>${rows.map(c=>`<tr>
    <td class="num rank">${c.rownum}</td>
    <td><a href="${c.twitchurl}" target="_blank">${c.displayname}</a></td>
    <td>${c.language||"—"}</td>
    <td class="num">${toHrs(c.viewminutes)}</td><td class="num">${toHrs(c.streamedminutes)}</td>
    <td class="num">${fmt(c.maxviewers)}</td><td class="num">${fmt(c.avgviewers)}</td>
    <td class="num">${fmt(c.followers)}</td></tr>`).join("")}</tbody>`;
  document.getElementById("alltable").innerHTML=head+body;
}
const toHrs=m=>fmt(Math.round((m||0)/60));
function setSort(key){ if(sortKey===key)sortDir*=-1; else{sortKey=key;sortDir=-1;} allTable(); }

function streams(){
  const el=document.getElementById("streams");
  if(!D.streams||!D.streams.length){
    el.innerHTML=`<div class="row"><div></div><div class="meta">Feed empty — run collect_streams.py</div><div></div></div>`;
    return;
  }
  el.innerHTML=D.streams.map(s=>{
    const watchHrs=Math.round((s.avgviewers||0)*(s.length||0)/60);
    const ch=s.channelurl||s.channeldisplayname;
    return `<div class="row"><div>▶</div>
      <div><div class="name"><a href="https://www.twitch.tv/${ch}" target="_blank">${s.channeldisplayname}</a>
      <span class="pill">${s.starttime||""}</span></div>
      <div class="meta">${Math.round((s.length||0))} min · ${s.game||"Last Pirates"} ·
      avg ${fmt(s.avgviewers)} · ~${fmt(watchHrs)} watch-hrs · +${fmt(s.followergain)} followers</div></div>
      <div class="big">${fmt(s.maxviewers)}<div class="meta">peak viewers</div></div></div>`;
  }).join("");
}

let liveTimer=null;
function uptime(iso){
  if(!iso) return "";
  const mins=Math.max(0,Math.round((Date.now()-new Date(iso))/60000));
  const h=Math.floor(mins/60), m=mins%60;
  return h?`${h}h ${m}m`:`${m}m`;
}
async function drawLive(){
  const el=document.getElementById("live");
  let data=null;
  try{ data=await (await fetch("/api/live",{cache:"no-store"})).json(); }
  catch(e){ try{ data=await (await fetch("live.json",{cache:"no-store"})).json(); }catch(_){} }
  if(!data){ el.innerHTML=`<div class="row"><div></div><div class="meta">Live data unavailable (deploy /api/live or run collect_live.py)</div><div></div></div>`; return; }
  const live=data.live||[];
  document.getElementById("liveCount").textContent=`${live.length} live`;
  if(!live.length){ el.innerHTML=`<div class="row"><div></div><div class="meta">No one is streaming Last Pirates right now.</div><div></div></div>`; }
  else{
    el.innerHTML=live.map(s=>`<div class="row"><div style="color:#f85149">●</div>
      <div><div class="name"><a href="https://www.twitch.tv/${s.user_login}" target="_blank">${s.user_name}</a>
      <span class="pill" style="color:#f85149;border-color:#f85149">LIVE ${uptime(s.started_at)}</span>
      <span class="pill">${s.language||""}</span></div>
      <div class="meta">${(s.title||"").replace(/</g,"&lt;").slice(0,90)}</div></div>
      <div class="big">${fmt(s.viewer_count)}<div class="meta">viewers</div></div></div>`).join("");
  }
  // auto-refresh every 60s while the Live tab is open
  clearTimeout(liveTimer);
  if(document.querySelector(".tab[data-tab=live]").classList.contains("active"))
    liveTimer=setTimeout(drawLive,60000);
}

function drawTrends(){
  if(charted.trends) return; charted.trends=true;
  const mk=(id,data,label,color)=>new Chart(document.getElementById(id),{
    type:"line",data:{labels:data.map(p=>p.date.slice(0,10)),
      datasets:[{label,data:data.map(p=>p.value),borderColor:color,
        backgroundColor:color+"22",fill:true,tension:.25,pointRadius:0,borderWidth:2}]},
    options:{maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:"#8b949e",maxTicksLimit:8},grid:{color:"#1c2230"}},
        y:{ticks:{color:"#8b949e"},grid:{color:"#1c2230"}}}}});
  mk("cChannels",D.timeseries.channels,"Channels","#3fb950");
  mk("cViewers",D.timeseries.viewers,"Viewers","#58a6ff");
}

function drawLangs(){
  if(charted.langs) return; charted.langs=true;
  const ent=Object.entries(D.languages).filter(([l])=>l).sort((a,b)=>b[1]-a[1]);
  const top=ent.slice(0,10), pal=["#58a6ff","#3fb950","#e3b341","#f85149","#bc8cff",
    "#39c5cf","#db61a2","#ff9b50","#a5d6ff","#7ee787"];
  new Chart(document.getElementById("cLang"),{type:"doughnut",
    data:{labels:top.map(e=>e[0]),datasets:[{data:top.map(e=>e[1]),backgroundColor:pal}]},
    options:{maintainAspectRatio:false,plugins:{legend:{position:"right",
      labels:{color:"#e6edf3",boxWidth:12}}}}});
  const max=ent[0][1];
  document.getElementById("langlist").innerHTML=ent.map(([l,v])=>
    `<div class="lang"><span>${l}</span><span>${fmt(v)}</span></div>
     <div class="bar" style="width:${(v/max*100).toFixed(1)}%"></div>`).join("");
}

fetch("data.json").then(r=>r.json()).then(d=>{
  D=d; buildNav();
  document.getElementById("meta").textContent=
    `updated ${(d.generated_at||"").replace("T"," ").slice(0,16)} UTC · source: SullyGnome · 365-day window`;
  document.getElementById("foot").innerHTML=
    `Data: SullyGnome (Twitch). ${fmt(d.channels.length)} channels · ${fmt(d.streams.length)} streams in feed. Dashboard refreshes daily.`;
  document.getElementById("search").addEventListener("input",allTable);
  overview(); topChannels(); allTable(); streams();
}).catch(e=>{document.getElementById("meta").textContent="failed to load data.json: "+e;});
</script>
</body>
</html>
